<html lang="pt-br" >
<head>
<title>teste jscript</title>
<meta charset="utf-8"/>

<script>

function acendelampada() {
  document.getElementById("luz").src="_imagens/lampada-acesa.jpg"; 
 
} 

function apagaluz() {
document.getElementById("luz").src="_imagens/lampada-apagada.jpg";

}

function quebraluz() {
document.getElementById("luz").src="_imagens/lampada-quebrada.jpg";

}




</script>



</head>
<body>
<h1> acenda a lampada </h1>
<img src="_imagens/lampada-apagada.jpg" id="luz" onmousemove="acendelampada()" onmouseout="apagaluz()" onclick="quebraluz()"     >

</body>
</html>
